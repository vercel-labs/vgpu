name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-fast:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:fast
      - run: pnpm bundle-check

  wgsl-loader-bundler-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test packages/wgsl/tests/webpack-real.test.ts packages/wgsl/tests/vite-real.test.ts

  test-integration:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker test image
        run: docker buildx build --platform linux/arm64 --load -t vgpu-test:s2 -f infra/test-docker/Dockerfile .
      - name: Run integration tests in Docker
        run: |
          docker run --rm vgpu-test:s2 sh -lc '
            Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 &
            xvfb_pid=$!
            VGPU_DOCKER_TEST=1 pnpm test
            status=$?
            kill $xvfb_pid
            exit $status
          '
      - name: Prune labeled Docker test images
        run: docker image prune -f --filter "label=vgpu-test=1"

  wgsl-cachekey-determinism:
    name: wgsl-cachekey-determinism (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test packages/wgsl/tests/cache-key.test.ts

  wgsl-turbopack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vgpu/wgsl build
      - name: next build (turbopack)
        run: pnpm --filter @vgpu/example-next-wgsl exec next build --turbopack
      - name: assert WGSL content in Turbopack output
        run: |
          grep -Rn "helper_color" examples/next-wgsl/.next/server examples/next-wgsl/.next/static > /tmp/wgsl-build-helper-matches.txt
          head -20 /tmp/wgsl-build-helper-matches.txt
          grep -Rn "0.1, 0.2, 0.3" examples/next-wgsl/.next/server examples/next-wgsl/.next/static > /tmp/wgsl-build-color-matches.txt
          head -20 /tmp/wgsl-build-color-matches.txt
      - name: next dev HMR smoke (turbopack)
        run: |
          set -euo pipefail
          HELPER=examples/next-wgsl/app/helper.wgsl
          ORIGINAL=$(cat "$HELPER")
          cleanup() {
            printf '%s\n' "$ORIGINAL" > "$HELPER"
            if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          pnpm --filter @vgpu/example-next-wgsl exec next dev --turbopack -p 3100 > /tmp/next-wgsl-dev.log 2>&1 &
          SERVER_PID=$!
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:3100/ > /tmp/wgsl-before.html; do sleep 1; done'
          grep -q "0.1, 0.2, 0.3" /tmp/wgsl-before.html
          cat > "$HELPER" <<'EOF'
          export fn helper_color() -> vec4f { return vec4f(0.9, 0.8, 0.7, 1.0); }
          EOF
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:3100/ > /tmp/wgsl-after.html && grep -q "0.9, 0.8, 0.7" /tmp/wgsl-after.html; do sleep 1; done'
          grep -n "0.9, 0.8, 0.7" /tmp/wgsl-after.html | head -5
          python3 - <<'PY'
          from pathlib import Path
          text = Path("/tmp/wgsl-after.html").read_text()
          idx = text.find("0.9, 0.8, 0.7")
          print(text[max(0, idx - 120):idx + 160] if idx >= 0 else text[:280])
          PY
          tail -30 /tmp/next-wgsl-dev.log

  docs-generated:
    # Guards that the committed docs manifest + generated skill are in sync with their sources
    # (co-located *.docs.md, docs/topics, docs/allowlist.txt). The generator is dependency-free
    # (pure Node), so no install/build is needed.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate docs manifest + skill
        run: node packages/vgpu/lib/docs/generate/cli.js
      - name: Fail if the generated manifest/skill are out of date
        run: |
          changed=$(git status --porcelain -- skills/vgpu packages/vgpu/lib/generated/docs-manifest.generated.js)
          if [ -n "$changed" ]; then
            echo "::error::Generated docs are out of date. Run 'pnpm -F vgpu generate:docs' and commit skills/vgpu and packages/vgpu/lib/generated/docs-manifest.generated.js."
            echo "$changed"
            git diff -- skills/vgpu packages/vgpu/lib/generated/docs-manifest.generated.js
            exit 1
          fi
          echo "Generated docs manifest + skill are up to date."
